<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face-API.js Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        video { width: 320px; height: 240px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Face-API.js Debug Test</h1>
    
    <div>
        <button onclick="testLocalModels()">Test Local Models</button>
        <button onclick="testCDNModels()">Test CDN Models</button>
        <button onclick="testCamera()">Test Camera</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="logs"></div>
    
    <video id="video" autoplay muted></video>
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(div);
            console.log(message);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        async function testLocalModels() {
            try {
                log('🚀 Testing local models...', 'info');
                
                // Test if models are accessible
                const response = await fetch('/models/tiny_face_detector_model-weights_manifest.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                log('✅ Local models are accessible', 'success');
                
                // Load models
                log('📥 Loading TinyFaceDetector...', 'info');
                await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
                log('✅ TinyFaceDetector loaded', 'success');
                
                log('📥 Loading FaceLandmark68Net...', 'info');
                await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
                log('✅ FaceLandmark68Net loaded', 'success');
                
                log('📥 Loading FaceRecognitionNet...', 'info');
                await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
                log('✅ FaceRecognitionNet loaded', 'success');
                
                log('🎉 All local models loaded successfully!', 'success');
                
            } catch (error) {
                log(`❌ Local models failed: ${error.message}`, 'error');
                console.error('Local models error:', error);
            }
        }
        
        async function testCDNModels() {
            try {
                log('🚀 Testing CDN models...', 'info');
                
                const CDN_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/weights';
                
                log('📥 Loading TinyFaceDetector from CDN...', 'info');
                await faceapi.nets.tinyFaceDetector.loadFromUri(CDN_URL);
                log('✅ TinyFaceDetector loaded from CDN', 'success');
                
                log('📥 Loading FaceLandmark68Net from CDN...', 'info');
                await faceapi.nets.faceLandmark68Net.loadFromUri(CDN_URL);
                log('✅ FaceLandmark68Net loaded from CDN', 'success');
                
                log('📥 Loading FaceRecognitionNet from CDN...', 'info');
                await faceapi.nets.faceRecognitionNet.loadFromUri(CDN_URL);
                log('✅ FaceRecognitionNet loaded from CDN', 'success');
                
                log('🎉 All CDN models loaded successfully!', 'success');
                
            } catch (error) {
                log(`❌ CDN models failed: ${error.message}`, 'error');
                console.error('CDN models error:', error);
            }
        }
        
        async function testCamera() {
            try {
                log('📹 Testing camera access...', 'info');
                
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Camera API not supported');
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 480 },
                        height: { ideal: 360 },
                        facingMode: 'user'
                    },
                    audio: false
                });
                
                log('✅ Camera access granted', 'success');
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    log(`✅ Video loaded: ${video.videoWidth}x${video.videoHeight}`, 'success');
                };
                
            } catch (error) {
                log(`❌ Camera failed: ${error.message}`, 'error');
                console.error('Camera error:', error);
            }
        }
        
        // Auto-test on load
        window.onload = () => {
            log('🔧 Face-API.js Debug Test Started', 'info');
            log(`📍 Current URL: ${window.location.href}`, 'info');
            log(`🌐 User Agent: ${navigator.userAgent}`, 'info');
        };
    </script>
</body>
</html>
