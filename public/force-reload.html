<!DOCTYPE html>
<html>
<head>
    <title>Force Reload</title>
</head>
<body>
    <h1>Force Complete Reload</h1>
    <button onclick="forceReload()">Clear Everything & Reload</button>
    <div id="result"></div>
    
    <script>
        function forceReload() {
            // Clear all storage
            localStorage.clear();
            sessionStorage.clear();
            
            // Clear all caches
            if ('caches' in window) {
                caches.keys().then(function(names) {
                    names.forEach(function(name) {
                        caches.delete(name);
                    });
                });
            }
            
            document.getElementById('result').innerHTML = '<p style="color: green;">All data cleared! Redirecting...</p>';
            
            // Redirect to main app with cache busting
            setTimeout(() => {
                window.location.href = 'http://localhost:3000/students?t=' + Date.now();
            }, 1000);
        }
    </script>
</body>
</html>
